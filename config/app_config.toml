[app]
name = "Career Intelligence Platform"
env = "development"
host = "127.0.0.1"
port = 8000
debug = false

[security]
secret_key = "development-only-change-me"
cookie_secure = false
session_cookie_name = "career_intelligence_session"
jwt_algorithm = "HS256"
access_token_expire_minutes = 1440

[database]
url = "postgresql+psycopg://career:career_dev_password@localhost:5432/career_intelligence"

[llm]
base_url = "https://api.deepseek.com"
api_key = ""
model = "deepseek-reasoner"
timeout_seconds = 90.0
max_tokens = 8192

[storage]
root = "storage"
max_upload_size_mb = 25

[pdf]
latex_engine = "xelatex"
