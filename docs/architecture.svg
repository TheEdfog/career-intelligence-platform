<svg xmlns="http://www.w3.org/2000/svg" width="1340" height="570"
    viewBox="0 0 1340 570" role="img" aria-labelledby="diagram-title diagram-description">
    <title id="diagram-title">Архитектура сервиса анализа вакансий</title>
    <desc id="diagram-description">Профиль и вакансия проходят через FastAPI и сервисы анализа. Результаты сохраняются в PostgreSQL, LLM используется опционально.</desc>
    <defs>
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
        <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0F172A" flood-opacity="0.08"/>
      </filter>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3"
        orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#64748B"/>
      </marker>
      <style>
        text { font-family: Inter, "Segoe UI", Arial, sans-serif; fill: #0F172A; }
        .label { font-size: 13px; font-weight: 600; letter-spacing: 0.08em; fill: #64748B; }
        .title { font-size: 19px; font-weight: 600; }
        .detail { font-size: 15px; fill: #475569; }
        .step { font-size: 13px; font-weight: 700; fill: #FFFFFF; }
        .arrow { fill: none; stroke: #64748B; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
        .edge-label { font-size: 13px; font-weight: 500; fill: #64748B; }
        .lane-label { font-size: 14px; font-weight: 700; letter-spacing: 0.08em; fill: #475569; }
      </style>
    </defs>
    <rect x="1" y="1" width="1338" height="568" rx="24"
      fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>

      <text x="55" y="55" class="lane-label">ОСНОВНОЙ СЦЕНАРИЙ</text>
      <path d="M 315 169 L 375 169" class="arrow" marker-end="url(#arrow)"/><path d="M 635 169 L 695 169" class="arrow" marker-end="url(#arrow)"/><path d="M 955 169 L 1015 169" class="arrow" marker-end="url(#arrow)"/>

    <g>
      <rect x="55" y="94" width="260" height="150" rx="16"
        fill="#EFF6FF" stroke="#93C5FD" stroke-width="2" filter="url(#shadow)"/>
      <circle cx="83" cy="122" r="14" fill="#2563EB"/>
         <text x="83" y="127" class="step" text-anchor="middle">1</text>
      <text x="107" y="124" class="label">ВХОД</text>
      <text x="79" y="159" class="title" text-anchor="start"><tspan x="79" dy="0">Профиль и вакансия</tspan></text>
      <text x="79" y="195" class="detail" text-anchor="start"><tspan x="79" dy="0">Навыки, опыт, требования</tspan></text>
    </g>

    <g>
      <rect x="375" y="94" width="260" height="150" rx="16"
        fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" filter="url(#shadow)"/>
      <circle cx="403" cy="122" r="14" fill="#64748B"/>
         <text x="403" y="127" class="step" text-anchor="middle">2</text>
      <text x="427" y="124" class="label">ПРИЛОЖЕНИЕ</text>
      <text x="399" y="159" class="title" text-anchor="start"><tspan x="399" dy="0">FastAPI и Jinja2</tspan></text>
      <text x="399" y="195" class="detail" text-anchor="start"><tspan x="399" dy="0">Routes, формы, безопасность</tspan></text>
    </g>

    <g>
      <rect x="695" y="94" width="260" height="150" rx="16"
        fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2" filter="url(#shadow)"/>
      <circle cx="723" cy="122" r="14" fill="#7C3AED"/>
         <text x="723" y="127" class="step" text-anchor="middle">3</text>
      <text x="747" y="124" class="label">АНАЛИЗ</text>
      <text x="719" y="159" class="title" text-anchor="start"><tspan x="719" dy="0">Parsing и matching</tspan></text>
      <text x="719" y="195" class="detail" text-anchor="start"><tspan x="719" dy="0">Score, evidence, пробелы</tspan></text>
    </g>

    <g>
      <rect x="1015" y="94" width="260" height="150" rx="16"
        fill="#ECFDF5" stroke="#6EE7B7" stroke-width="2" filter="url(#shadow)"/>
      <circle cx="1043" cy="122" r="14" fill="#059669"/>
         <text x="1043" y="127" class="step" text-anchor="middle">4</text>
      <text x="1067" y="124" class="label">РЕЗУЛЬТАТ</text>
      <text x="1039" y="159" class="title" text-anchor="start"><tspan x="1039" dy="0">Документы</tspan></text>
      <text x="1039" y="195" class="detail" text-anchor="start"><tspan x="1039" dy="0">Резюме и рекомендации</tspan></text>
    </g>

      <text x="375" y="330" class="lane-label">ИНФРАСТРУКТУРА</text>

    <g>
      <rect x="375" y="355" width="260" height="135" rx="16"
        fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2" filter="url(#shadow)"/>

      <text x="399" y="385" class="label">ОПЦИОНАЛЬНО</text>
      <text x="399" y="420" class="title" text-anchor="start"><tspan x="399" dy="0">LLM adapter</tspan></text>
      <text x="399" y="456" class="detail" text-anchor="start"><tspan x="399" dy="0">Дополнительный разбор текста</tspan></text>
    </g>

    <g>
      <rect x="695" y="355" width="260" height="135" rx="16"
        fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" filter="url(#shadow)"/>

      <text x="719" y="385" class="label">ХРАНЕНИЕ</text>
      <text x="719" y="420" class="title" text-anchor="start"><tspan x="719" dy="0">PostgreSQL</tspan></text>
      <text x="719" y="456" class="detail" text-anchor="start"><tspan x="719" dy="0">Профили, вакансии, результаты</tspan></text>
    </g>
      <text x="505" y="234" class="edge-label" text-anchor="middle">при включении</text><path d="M 505 244 L 505 355" class="arrow" stroke-dasharray="7 7" marker-end="url(#arrow)"/>
      <path d="M 825 244 L 825 355" class="arrow" marker-end="url(#arrow)"/>

  </svg>